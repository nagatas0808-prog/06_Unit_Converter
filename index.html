<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>単位変換！ - 便利ツール集</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            background-color: #efefef;
            color: #000000;
            font-family: "MS PGothic", "MS Pゴシック", sans-serif;
            margin: 20px;
        }

        .container {
            width: 750px;
            margin: 0 auto;
            background-color: #ffffff;
            border: 2px solid #000000;
            padding: 15px;
        }

        h1 {
            color: #ffffff;
            background-color: #000080;
            padding: 5px;
            font-size: 20px;
            text-align: center;
            margin: -15px -15px 15px -15px;
        }

        table.conv {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        table.conv th {
            background-color: #cccccc;
            border: 1px solid #000000;
            padding: 5px;
            font-size: 14px;
        }

        table.conv td {
            border: 1px solid #000000;
            padding: 10px;
            vertical-align: top;
            background-color: #f9f9f9;
        }

        .input-group {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        input {
            width: 100px;
            border: 1px solid #999;
            padding: 2px;
        }

        .unit-label {
            font-size: 12px;
            font-weight: bold;
            width: 40px;
        }

        .arrow {
            font-size: 16px;
            color: #ff0000;
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            border-top: 1px dotted #999999;
            padding-top: 10px;
        }

        a {
            color: #0000ff;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>単位変換！ (Unit Converter)</h1>

        <div style="text-align: center; margin-bottom: 15px;">
            <marquee width="80%" scrollamount="3">日常の面倒な単位計算、ここでお手軽に解決しちゃいましょう！</marquee>
        </div>

        <div id="root"></div>

        <div class="footer">
            [ <a href="https://00portal.kotojisamadake-tool.workers.dev/">便利ツール集ポータルへ戻る</a> ]
        </div>
    </div>

    <script type="text/babel">
        const ConverterRow = ({ title, units }) => {
            const [vals, setVals] = React.useState(units.map(() => ''));

            const handleChange = (index, value) => {
                if (value === '' || isNaN(value)) {
                    setVals(units.map(() => ''));
                    return;
                }

                const num = parseFloat(value);
                const base = num / units[index].ratio; // Convert to base unit

                const newVals = units.map(u => {
                    const converted = base * u.ratio;
                    return Number.isInteger(converted) ? converted.toString() : converted.toFixed(4).replace(/\.?0+$/, '');
                });
                setVals(newVals);
            };

            return (
                <tr>
                    <th width="100">{title}</th>
                    <td>
                        <div style={{ display: 'flex', flexWrap: 'wrap', gap: '15px' }}>
                            {units.map((u, i) => (
                                <div key={u.label} className="input-group">
                                    <span className="unit-label">{u.label}</span>
                                    <input
                                        type="text"
                                        value={vals[i]}
                                        onChange={(e) => handleChange(i, e.target.value)}
                                    />
                                </div>
                            ))}
                        </div>
                    </td>
                </tr>
            );
        };

        const App = () => {
            return (
                <table class="conv">
                    <ConverterRow
                        title="長さ"
                        units={[
                            { label: 'm', ratio: 1 },
                            { label: 'cm', ratio: 100 },
                            { label: 'km', ratio: 0.001 },
                            { label: 'inch', ratio: 39.3701 },
                            { label: 'ft', ratio: 3.28084 }
                        ]}
                    />
                    <ConverterRow
                        title="重さ"
                        units={[
                            { label: 'kg', ratio: 1 },
                            { label: 'g', ratio: 1000 },
                            { label: 't', ratio: 0.001 },
                            { label: 'lb', ratio: 2.20462 },
                            { label: 'oz', ratio: 35.274 }
                        ]}
                    />
                    <ConverterRow
                        title="面積"
                        units={[
                            { label: 'm²', ratio: 1 },
                            { label: 'km²', ratio: 0.000001 },
                            { label: 'ha', ratio: 0.0001 },
                            { label: '坪', ratio: 0.3025 },
                            { label: '畳', ratio: 0.605 }
                        ]}
                    />
                </table>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
